#
# 🔨 Configure the plugins messages.
# You can use MiniMessage in this section. This also works with
# legacy bukkit colors, but isn't recommended, because of
# an incompatibility!
# Also, PlaceholderAPI is supported.
#
# 📷 Viewer:
# https://webui.advntr.dev/
#
# 📚 Format:
# https://docs.papermc.io/adventure/minimessage/format/
message:
    # 🪄 Determine the message prefix for the plugin.
    prefix: <green><bold>FW</bold></green><dark_gray> ►<reset>
    help:
        debug: Derinti FoxWall konsolėje.
        reload: Iš naujo įkelti konfigūracijos failą.
        update: Automatiškai atnaujina papildinio komponentus už jus.
    debug:
        enable: '{prefix} <green>Derinimo režimas įjungtas. Patikrinkite konsolę.'
        disable: '{prefix} <red>Derinimo režimas išjungtas.'
    kick:
        null_ip: <red>Neteisingas prisijungimas.</red>
        samebackend_ip: <red>Prisijungimas iš jūsų IP adreso atmestas.</red>
    reload:
        message: '{prefix} <green>Konfigūracijos failas buvo iš naujo įkeltas.'
    update:
        invalid_usage: '{prefix} Naudokite komandą <dark_gray>''</dark_gray>/fw update <green><plugin></green><dark_gray>''</dark_gray><reset>.'
        already_downloading: '{prefix} <red>Mes jau atsisiunčiame failą...'
        backend_down: '{prefix} <red>Atrodo, kad mūsų serverinė dalis neveikia arba yra nestabili. Negalime atnaujinti ir užbaigti užklausos.'
        invalid_license: '{prefix} <red>Jūsų licencija negaliojanti, įveskite galiojantį šios veiksmui raktą.'
        downloading_jar: '{prefix} <yellow>Atsisiunčiamas papildinys...'
        downloaded_jar: '{prefix} <green>Atsisiųstas naujausias JAR iš mūsų serverinės dalies/centro. Paleiskite serverį iš naujo, kad pritaikytumėte pakeitimus.'
