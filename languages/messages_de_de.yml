#
# 🔨 Configure the plugins messages.
# You can use MiniMessage in this section. This also works with
# legacy bukkit colors, but isn't recommended, because of
# an incompatibility!
# Also, PlaceholderAPI is supported.
#
# 📷 Viewer:
# https://webui.advntr.dev/
#
# 📚 Format:
# https://docs.papermc.io/adventure/minimessage/format/
message:
    # 🪄 Determine the message prefix for the plugin.
    prefix: <green><bold>FW</bold></green><dark_gray> ►<reset>
    help:
        debug: FoxWall in der Konsole debuggen.
        reload: Konfigurationsdatei neu laden.
        update: Aktualisiert die Plugin-Komponenten automatisch für dich.
    debug:
        enable: '{prefix} <green>Debug-Modus aktiviert. Überprüfe die Konsole.'
        disable: '{prefix} <red>Debug-Modus deaktiviert.'
    kick:
        null_ip: <red>Ungültige Verbindung.</red>
        samebackend_ip: <red>Verbindung von deiner IP-Adresse wurde abgelehnt.</red>
    reload:
        message: '{prefix} <green>Die Konfigurationsdatei wurde neu geladen.'
    update:
        invalid_usage: '{prefix} Verwende den Befehl <dark_gray>''</dark_gray>/fw update <green><plugin></green><dark_gray>''</dark_gray><reset>.'
        already_downloading: '{prefix} <red>Wir laden bereits eine Datei herunter...'
        backend_down: '{prefix} <red>Unser Backend scheint nicht erreichbar oder instabil zu sein. Wir können die Anfrage nicht aktualisieren und abschließen.'
        invalid_license: '{prefix} <red>Deine Lizenz ist ungültig, gib einen gültigen Schlüssel für diese Aktion ein.'
        downloading_jar: '{prefix} <yellow>Plugin wird heruntergeladen...'
        downloaded_jar: '{prefix} <green>Die neueste JAR wurde von unserem Backend/Zentralserver heruntergeladen. Starte deinen Server neu, um die Änderungen zu übernehmen.'
