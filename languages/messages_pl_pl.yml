#
# 🔨 Configure the plugins messages.
# You can use MiniMessage in this section. This also works with
# legacy bukkit colors, but isn't recommended, because of
# an incompatibility!
# Also, PlaceholderAPI is supported.
#
# 📷 Viewer:
# https://webui.advntr.dev/
#
# 📚 Format:
# https://docs.papermc.io/adventure/minimessage/format/
message:
    # 🪄 Determine the message prefix for the plugin.
    prefix: <green><bold>FW</bold></green><dark_gray> ►<reset>
    help:
        debug: Debugowanie FoxWall w konsoli.
        reload: Przeładuj plik konfiguracyjny.
        update: Automatycznie aktualizuje komponenty wtyczki za ciebie.
    debug:
        enable: '{prefix} <green>Tryb debugowania włączony. Sprawdź konsolę.'
        disable: '{prefix} <red>Tryb debugowania wyłączony.'
    kick:
        null_ip: <red>Nieprawidłowe połączenie.</red>
        samebackend_ip: <red>Połączenie z twojego adresu IP zostało odrzucone.</red>
    reload:
        message: '{prefix} <green>Plik konfiguracyjny został przeładowany.'
    update:
        invalid_usage: '{prefix} Użyj komendy <dark_gray>''</dark_gray>/fw update <green><plugin></green><dark_gray>''</dark_gray><reset>.'
        already_downloading: '{prefix} <red>Już pobieramy plik...'
        backend_down: '{prefix} <red>Nasz backend wydaje się być niedostępny lub niestabilny. Nie możemy zaktualizować i zrealizować żądania.'
        invalid_license: '{prefix} <red>Twoja licencja jest nieprawidłowa, podaj prawidłowy klucz dla tej akcji.'
        downloading_jar: '{prefix} <yellow>Pobieranie wtyczki...'
        downloaded_jar: '{prefix} <green>Pobrano najnowszy JAR z naszego backendu/centrali. Zrestartuj serwer, aby zastosować zmiany.'
