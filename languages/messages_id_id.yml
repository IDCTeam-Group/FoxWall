#
# 🔨 Configure the plugins messages.
# You can use MiniMessage in this section. This also works with
# legacy bukkit colors, but isn't recommended, because of
# an incompatibility!
# Also, PlaceholderAPI is supported.
#
# 📷 Viewer:
# https://webui.advntr.dev/
#
# 📚 Format:
# https://docs.papermc.io/adventure/minimessage/format/
message:
    # 🪄 Determine the message prefix for the plugin.
    prefix: <green><bold>FW</bold></green><dark_gray> ►<reset>
    help:
        debug: Debug FoxWall di konsol.
        reload: Muat ulang berkas konfigurasi.
        update: Memperbarui komponen plugin secara otomatis untukmu.
    debug:
        enable: '{prefix} <green>Mode debug diaktifkan. Periksa konsol.'
        disable: '{prefix} <red>Mode debug dinonaktifkan.'
    kick:
        null_ip: <red>Koneksi tidak valid.</red>
        samebackend_ip: <red>Koneksi ditolak dari alamat IP-mu.</red>
    reload:
        message: '{prefix} <green>Berkas konfigurasi telah dimuat ulang.'
    update:
        invalid_usage: '{prefix} Gunakan perintah <dark_gray>''</dark_gray>/fw update <green><plugin></green><dark_gray>''</dark_gray><reset>.'
        already_downloading: '{prefix} <red>Kami sudah mengunduh sebuah berkas...'
        backend_down: '{prefix} <red>Backend kami sepertinya sedang down atau tidak stabil. Kami tidak dapat memperbarui dan menyelesaikan permintaan.'
        invalid_license: '{prefix} <red>Lisensimu tidak valid, masukkan kunci yang valid untuk tindakan ini.'
        downloading_jar: '{prefix} <yellow>Mengunduh plugin...'
        downloaded_jar: '{prefix} <green>JAR terbaru telah diunduh dari backend/central kami. Mulai ulang servermu untuk menerapkan perubahan.'
